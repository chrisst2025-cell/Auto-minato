<!DOCTYPE html>
<html lang="fr">
   <head>
      <meta charset="UTF-8">
      <title>Minato Bot - Utilisateurs en Ligne</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      
      <!-- Feuilles de style -->
      <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap">
      
      <style>
         :root {
             --minato-yellow: #facc15;
             --minato-gold: #eab308;
             --minato-orange: #f97316;
             --rasengan-blue: #06b6d4;
             --dark-bg: rgba(10, 15, 30, 0.82);
             --glass-bg: rgba(18, 25, 45, 0.72);
             --border-glow: rgba(250, 204, 21, 0.4);
             --text-color: #f8fafc;
             --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
         }

         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
             font-family: 'Poppins', sans-serif;
         }

         body {
             background: linear-gradient(135deg, #090d16 0%, #111827 50%, #030712 100%), 
                         url('https://images.alphacoders.com/605/605592.png') no-repeat center center fixed;
             background-size: cover;
             color: var(--text-color);
             line-height: 1.6;
             min-height: 100vh;
             position: relative;
             overflow-x: hidden;
         }

         /* Effet d'éclairs animés en arrière-plan */
         body::before {
             content: '';
             position: fixed;
             top: 0; left: 0; right: 0; bottom: 0;
             background: radial-gradient(circle at 50% 20%, rgba(250, 204, 21, 0.08) 0%, transparent 60%);
             pointer-events: none;
             z-index: 0;
             animation: pulseGlow 6s infinite alternate;
         }

         @keyframes pulseGlow {
             0% { opacity: 0.4; }
             100% { opacity: 1; }
         }

         /* Barre de défilement */
         ::-webkit-scrollbar {
             width: 10px;
         }
         ::-webkit-scrollbar-track {
             background: rgba(15, 23, 42, 0.8);
         }
         ::-webkit-scrollbar-thumb {
             background: linear-gradient(180deg, var(--minato-yellow), var(--minato-orange));
             border-radius: 5px;
             box-shadow: 0 0 10px var(--minato-yellow);
         }

         /* Navigation Bar */
         .navbar {
             background: rgba(10, 15, 30, 0.85) !important;
             backdrop-filter: blur(15px);
             border-bottom: 2px solid var(--border-glow);
             box-shadow: 0 4px 25px rgba(250, 204, 21, 0.15);
             padding: 0.8rem 2rem;
             position: sticky;
             top: 0;
             z-index: 1000;
         }

         .navbar-brand {
             font-family: 'Orbitron', sans-serif;
             font-weight: 700;
             color: var(--minato-yellow) !important;
             font-size: 1.4rem;
             text-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
             display: flex;
             align-items: center;
             gap: 10px;
         }

         .nav-link {
             color: #cbd5e1 !important;
             font-weight: 500;
             padding: 0.5rem 1.2rem !important;
             border-radius: 8px;
             transition: var(--transition);
         }

         .nav-link:hover, .nav-item.active .nav-link {
             color: var(--minato-yellow) !important;
             background: rgba(250, 204, 21, 0.1);
             text-shadow: 0 0 8px var(--minato-yellow);
         }

         /* Conteneurs avec effet verre */
         .container {
             background: var(--glass-bg);
             backdrop-filter: blur(16px);
             -webkit-backdrop-filter: blur(16px);
             border: 1px solid var(--border-glow);
             border-radius: 18px;
             padding: 2rem;
             margin: 2rem auto;
             box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
             animation: fadeInUp 0.8s ease-out;
         }

         h1 {
             font-family: 'Orbitron', sans-serif;
             color: var(--minato-yellow);
             letter-spacing: 0.5px;
         }

         /* Style des Cartes Utilisateurs en Ligne */
         .user-card {
             display: flex;
             align-items: center;
             background: rgba(15, 23, 42, 0.7);
             border: 1px solid var(--border-glow);
             border-radius: 14px;
             padding: 12px;
             width: 100%;
             transition: var(--transition);
             animation: glowCard 3s infinite alternate;
             box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
         }

         .user-card:hover {
             transform: translateY(-3px) scale(1.01);
             border-color: var(--minato-yellow);
             box-shadow: 0 8px 25px rgba(250, 204, 21, 0.3);
             background: rgba(20, 30, 55, 0.85);
         }

         @keyframes glowCard {
             from {
                 border-color: rgba(250, 204, 21, 0.3);
                 box-shadow: 0 0 10px rgba(250, 204, 21, 0.1);
             }
             to {
                 border-color: var(--rasengan-blue);
                 box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
             }
         }

         .user-card img {
             width: 65px;
             height: 65px;
             object-fit: cover;
             border-radius: 50%;
             border: 2px solid var(--minato-yellow);
             box-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
             margin-right: 15px;
         }

         .user-info {
             flex-grow: 1;
             overflow: hidden;
         }

         .user-info h4 {
             font-family: 'Orbitron', sans-serif;
             color: #fff;
             font-size: 1.05rem;
             font-weight: 600;
             margin-bottom: 4px;
             white-space: nowrap;
             overflow: hidden;
             text-overflow: ellipsis;
             text-align: left;
         }

         .user-info p {
             margin: 0;
             font-size: 0.85rem;
             color: #94a3b8;
             white-space: nowrap;
             overflow: hidden;
             text-overflow: ellipsis;
             text-align: left;
         }

         .user-info p a {
             color: var(--rasengan-blue);
             text-decoration: none;
             transition: var(--transition);
         }

         .user-info p a:hover {
             color: var(--minato-yellow);
             text-shadow: 0 0 8px var(--minato-yellow);
         }

         p.uptime-user {
             color: var(--minato-yellow);
             font-weight: 600;
             font-size: 0.85rem;
             margin-top: 2px;
             display: flex;
             align-items: center;
             gap: 6px;
         }

         p.uptime-user::before {
             content: '';
             display: inline-block;
             width: 8px;
             height: 8px;
             background-color: #22c55e;
             border-radius: 50%;
             box-shadow: 0 0 8px #22c55e;
         }

         @keyframes fadeInUp {
             from { opacity: 0; transform: translateY(20px); }
             to { opacity: 1; transform: translateY(0); }
         }

         @media (max-width: 768px) {
             .container { padding: 1.2rem; margin: 1rem; }
             .user-card img { width: 50px; height: 50px; }
         }
      </style>
   </head>
   <body>

      <!-- Barre de Navigation -->
      <nav class="navbar navbar-expand-lg">
         <a class="navbar-brand" href="/">
            <i class="fa-solid fa-bolt"></i> Minato Bot
         </a>
         <button class="navbar-toggler text-white" type="button" data-toggle="collapse" data-target="#navbarNav">
            <i class="fa-solid fa-bars" style="color: var(--minato-yellow);"></i>
         </button>
         <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
               <li class="nav-item">
                  <a class="nav-link" href="/"><i class="fa-solid fa-house"></i> Accueil</a>
               </li>
               <li class="nav-item active">
                  <a class="nav-link" href="online_user"><i class="fa-solid fa-users"></i> En Ligne</a>
               </li>
               <li class="nav-item dropdown">
                  <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown">
                     <i class="fa-solid fa-sliders"></i> Fonctionnalités
                  </a>
                  <div class="dropdown-menu bg-dark text-white border-warning">
                     <a class="dropdown-item text-warning" href="#"><i class="fa-solid fa-cookie"></i> Extracteur de Cookies</a>
                     <div class="dropdown-divider border-secondary"></div>
                     <a class="dropdown-item text-white" href="/step_by_step_guide"><i class="fa-solid fa-book"></i> Guide Étape par Étape</a>
                  </div>
               </li>
            </ul>
         </div>
      </nav>

      <!-- Liste des Bots Actifs -->
      <div class="container">
         <div class="row mb-3">
            <h1 class="col text-start" style="font-size: 1.3rem;">
               <i class="fa-solid fa-signal text-success"></i> Bots Actuellement en Ligne
            </h1>
         </div>
         <div class="row" id="user_online"></div>
      </div>

      <!-- Scripts -->
      <script>
         async function listOfAi() {
             const userOnline = document.getElementById("user_online");
             try {
                 const response = await fetch("/info");
                 const data = await response.json();
                 userOnline.innerHTML = '';
                 
                 if (data.length === 0) {
                     userOnline.innerHTML = `<div class="col-12 text-center text-muted p-4"><i class="fa-solid fa-circle-info mr-2"></i> Aucun bot n'est actuellement connecté.</div>`;
                     return;
                 }

                 data.forEach(user => {
                     const {
                         name,
                         thumbSrc,
                         profileUrl,
                         time,
                     } = user;

                     const userCard = document.createElement('div');
                     userCard.className = 'col-12 user-card mb-3';

                     const image = document.createElement('img');
                     image.src = thumbSrc;
                     image.alt = 'Avatar Utilisateur';
                     image.onerror = function() {
                         this.src = 'https://i.ibb.co/3mS6H24/minato-profile.jpg';
                     };

                     const userInfo = document.createElement('div');
                     userInfo.className = 'user-info';

                     const userName = document.createElement('h4');
                     userName.textContent = name;

                     const profileLink = document.createElement('p');
                     profileLink.innerHTML = `<i class="fa-solid fa-link mr-1"></i> <a href="${profileUrl}" target="_blank">${profileUrl}</a>`;

                     const uptimeUser = document.createElement('p');
                     uptimeUser.className = 'uptime-user';
                     uptimeUser.innerHTML = `Temps d'activité : ${timeFormat(time)}`;

                     userInfo.appendChild(userName);
                     userInfo.appendChild(profileLink);
                     userInfo.appendChild(uptimeUser);
                     userCard.appendChild(image);
                     userCard.appendChild(userInfo);
                     userOnline.appendChild(userCard);

                     const intervalId = setInterval(() => {
                         user.time++;
                         updateTimer(userCard, user.time);
                     }, 1000); 
                 });
             } catch (error) {
                 console.error(error);
                 userOnline.innerHTML = `<div class="alert alert-danger w-100 text-center" role="alert"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Une erreur est survenue lors de la récupération des données.</div>`;
             }
         }
         
         function updateTimer(userCard, currentTime) {
             const uptimeUser = userCard.querySelector('.uptime-user');
             if (uptimeUser) {
                 uptimeUser.innerHTML = `Temps d'activité : ${timeFormat(currentTime)}`;
             }
         }
         
         function timeFormat(currentTime) {
             const days = Math.floor(currentTime / (3600 * 24));
             const hours = Math.floor((currentTime % (3600 * 24)) / 3600);
             const minutes = Math.floor((currentTime % 3600) / 60);
             const seconds = currentTime % 60;

             let formatted = '';

             if (days > 0) formatted += `${days} j `;
             if (hours > 0) formatted += `${hours} h `;
             if (minutes > 0) formatted += `${minutes} m `;
             formatted += `${seconds} s`;

             return formatted.trim();
         }

         listOfAi();
      </script>

      <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
      <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
   </body>
</html>
